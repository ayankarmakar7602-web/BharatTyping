<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Typing Practice</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>


<div class="container">


<h1 class="logo">Pro Typing Practice</h1>



<!-- SETTINGS -->

<div class="settings">

<select id="language">

<option value="english">English</option>
<option value="bangla">বাংলা</option>
<option value="hindi">हिन्दी</option>

</select>


<select id="time">

<option value="60">1 Minute</option>
<option value="180">3 Minutes</option>
<option value="300">5 Minutes</option>

</select>


<button id="startBtn">Start Test</button>

</div>



<!-- LIVE STATS -->

<div class="stats">

<div class="stat">

<span id="wpm">0</span>
<p>WPM</p>

</div>


<div class="stat">

<span id="accuracy">100</span>
<p>Accuracy</p>

</div>


<div class="stat">

<span id="timer">0</span>
<p>Time</p>

</div>


</div>




<!-- TYPING AREA -->

<div id="typingArea" tabindex="0">

<div id="textDisplay">

Click "Start Test" to begin...

</div>

</div>




<!-- RESULT -->

<div id="resultSection" class="result">

<h2>Typing Result</h2>

<p>Speed: <span id="finalWPM"></span> WPM</p>

<p>Accuracy: <span id="finalAccuracy"></span>%</p>


<input id="userName" placeholder="Enter your name for certificate">


<button id="downloadCert">Download Certificate</button>

</div>



</div>




<!-- AUDIO -->

<audio id="keySound"
src="https://cdn.jsdelivr.net/gh/rohitsathish/key-click@master/key1.mp3"></audio>

<audio id="errorSound"
src="https://cdn.jsdelivr.net/gh/rohitsathish/key-click@master/key2.mp3"></audio>



<script src="script.js"></script>

</body>

</html>
