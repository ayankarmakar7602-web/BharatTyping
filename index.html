<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BharatTyping Elite </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&family=JetBrains+Mono:wght@500&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="dark-mode">
    <div class="container">
        <div id="main-menu" class="screen">
            <h1 class="logo">BHARAT<span>TYPING</span></h1>
            <p>Master the Art of Speed</p>
            <button class="main-opt" onclick="showLang()">START PRACTICE</button>
        </div>

        <div id="lang-screen" class="screen hidden">
            <button class="back-btn" onclick="goBack('main-menu')"> Back</button>
            <h2>Select Language</h2>
            <div class="opt-grid">
                <button onclick="setLang('english')">English (Global)</button>
                <button onclick="setLang('bengali')">Bengali ()</button>
                <button onclick="setLang('hindi')">Hindi ()</button>
            </div>
        </div>

        <div id="time-screen" class="screen hidden">
            <button class="back-btn" onclick="goBack('lang-screen')"> Back</button>
            <h2>Duration</h2>
            <div class="opt-grid">
                <button onclick="startApp(1)">1 Minute</button>
                <button onclick="startApp(2)">2 Minutes</button>
                <button onclick="startApp(5)">5 Minutes</button>
            </div>
        </div>

        <div id="typing-screen" class="screen hidden">
            <div class="stats-bar">
                <div class="s-box">TIME <span id="timer">01:00</span></div>
                <div class="s-box">WPM <span id="wpm">0</span></div>
                <div class="s-box">ACC <span id="acc">100%</span></div>
            </div>
            <div id="display-container" onclick="focusInput()">
                <div id="text-display"></div>
                <input type="text" id="master-input" autocomplete="off" autofocus>
            </div>
            <div class="keyboard-hint">Use Backspace to correct mistakes. Keep typing!</div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="result-header">
                <h2>Test Completed!</h2>
                <p>Verify your details for the certificate</p>
            </div>
            <div class="result-stats">
                <div class="r-box">Speed: <b id="res-wpm">0</b> WPM</div>
                <div class="r-box">Accuracy: <b id="res-acc">0</b>%</div>
            </div>
            <input type="text" id="user-name" placeholder="Enter Your Full Name" class="name-input">
            <div class="action-btns">
                <button onclick="prepareCertificate()" class="cert-btn">Download Pro Certificate </button>
                <button onclick="location.reload()" class="retry-btn">Try Again</button>
            </div>
        </div>
    </div>

    <audio id="sfx-key" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sfx-error" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
