<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BharatTyping Elite 🇮🇳</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="dark-mode">
    <div class="container">
        <button id="home-btn" class="nav-btn" onclick="location.reload()">🏠 Home</button>

        <div id="main-menu" class="screen">
            <h1 class="logo">BharatTyping <span>PRO</span></h1>
            <div class="mode-grid">
                <button class="main-opt" onclick="showLang()">Practice / Test</button>
                <div class="theme-switch">
                    <span>Light</span>
                    <input type="checkbox" id="theme-slider" checked onclick="toggleTheme()">
                    <span>Dark</span>
                </div>
            </div>
        </div>

        <div id="lang-screen" class="screen hidden">
            <button class="back-btn" onclick="goBack('main-menu')">← Back</button>
            <h2>ভাষা নির্বাচন করুন</h2>
            <div class="opt-grid">
                <button onclick="setLang('english')">English</button>
                <button onclick="setLang('bengali')">Bengali (বাংলা)</button>
                <button onclick="setLang('hindi')">Hindi (हिन्दी)</button>
            </div>
        </div>

        <div id="time-screen" class="screen hidden">
            <button class="back-btn" onclick="goBack('lang-screen')">← Back</button>
            <h2>সময় নির্বাচন করুন</h2>
            <div class="opt-grid">
                <button onclick="startApp(1)">1 Min</button>
                <button onclick="startApp(2)">2 Min</button>
                <button onclick="startApp(3)">3 Min</button>
                <button onclick="startApp(5)">5 Min</button>
            </div>
        </div>

        <div id="typing-screen" class="screen hidden">
            <div class="stats-header">
                <div class="stat">Time: <span id="timer">00:00</span></div>
                <div class="stat">WPM: <span id="wpm">0</span></div>
                <div class="stat">Acc: <span id="acc">100%</span></div>
            </div>
            
            <div id="display-wrapper" onclick="focusInput()">
                <div id="text-display"></div>
                <input type="text" id="master-input" autocomplete="off" autofocus>
            </div>
            
            <p class="instruction">টাইপ করা শুরু করো, ভুল হলে Backspace চাপো...</p>
        </div>

        <div id="result-screen" class="screen hidden">
            <h2>পারফরম্যান্স রিপোর্ট 🇮🇳</h2>
            <div class="result-card">
                <div class="res-item">Speed: <span id="res-wpm">0</span></div>
                <div class="res-item">Accuracy: <span id="res-acc">0</span>%</div>
            </div>
            <div class="action-btns">
                <button onclick="generateCertificate()" class="cert-btn">📜 Get Certificate</button>
                <button onclick="location.reload()">🔄 Restart</button>
            </div>
        </div>
    </div>

    <audio id="sfx-key" src="https://typingx0.com/sound/mechanical/key1.mp3"></audio>
    <audio id="sfx-error" src="https://www.myinstants.com/media/sounds/wrong-answer-126515.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
